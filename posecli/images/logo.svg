<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" fill="none">
  <defs>
    <linearGradient id="termBg" gradientUnits="userSpaceOnUse" x1="0" y1="40" x2="0" y2="240">
      <stop offset="0%" stop-color="#0F1B36"/>
      <stop offset="100%" stop-color="#0A1428"/>
    </linearGradient>
    <linearGradient id="termBar" gradientUnits="userSpaceOnUse" x1="0" y1="24" x2="0" y2="64">
      <stop offset="0%" stop-color="#1A2746"/>
      <stop offset="100%" stop-color="#152038"/>
    </linearGradient>
  </defs>

  <!-- Terminal window body (filling most of the 256x256 canvas, 16px margin) -->
  <rect x="16" y="24" width="224" height="208" rx="20" ry="20" fill="url(#termBg)"/>

  <!-- Title bar (top strip with rounded top corners only) -->
  <path d="M 16 44 A 20 20 0 0 1 36 24 L 220 24 A 20 20 0 0 1 240 44 L 240 64 L 16 64 Z"
        fill="url(#termBar)"/>
  <line x1="16" y1="64" x2="240" y2="64" stroke="#000" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Traffic-light dots, sized for 256px canvas -->
  <circle cx="38" cy="44" r="6" fill="#FF5F57"/>
  <circle cx="58" cy="44" r="6" fill="#FEBC2E"/>
  <circle cx="78" cy="44" r="6" fill="#28C840"/>

  <!-- Prompt + command, centered vertically in the body area (~y 65 to 232) -->
  <g font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'Courier New', monospace"
     font-weight="700" letter-spacing="-1.5">
    <!-- Prompt "$" + typed "pose" -->
    <text x="36" y="160" font-size="40">
      <tspan fill="#4A5A7A">$</tspan><tspan fill="#E8EEF7" dx="8">pose</tspan>
    </text>

    <!-- Cursor block immediately after "pose" -->
    <rect x="174" y="130" width="18" height="36" rx="2" fill="#1FA0FF">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Subtitle: CLI · v1.0 -->
    <text x="36" y="200" font-size="14" font-weight="400" fill="#4A5A7A" letter-spacing="2">CLI · v1.0</text>
  </g>
</svg>
